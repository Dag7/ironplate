{{/*
=============================================================================
Kubernetes Dashboard Deployment
=============================================================================
*/}}
{{- if and .Values.createNamespace .Values.namespace }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: kubernetes-dashboard
    app.kubernetes.io/part-of: {{ .Values.projectName }}
{{- end }}
---
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name | default .Values.fullnameOverride }}
  namespace: {{ .Values.namespace }}
  labels:
    app: kubernetes-dashboard
    app.kubernetes.io/name: kubernetes-dashboard
    app.kubernetes.io/part-of: {{ .Values.projectName }}
{{- if hasKey .Values.serviceAccount "automount" }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end }}
{{- end }}
---
{{- if and .Values.rbac.create .Values.rbac.clusterAdmin }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.fullnameOverride }}
  labels:
    app: kubernetes-dashboard
    app.kubernetes.io/name: kubernetes-dashboard
    app.kubernetes.io/part-of: {{ .Values.projectName }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name | default .Values.fullnameOverride }}
    namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.fullnameOverride }}
  namespace: {{ .Values.namespace }}
  labels:
    app: kubernetes-dashboard
    app.kubernetes.io/name: kubernetes-dashboard
    app.kubernetes.io/instance: kubernetes-dashboard
    app.kubernetes.io/part-of: {{ .Values.projectName }}
    app.kubernetes.io/managed-by: helm
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: kubernetes-dashboard
  template:
    metadata:
      labels:
        app: kubernetes-dashboard
        app.kubernetes.io/name: kubernetes-dashboard
        app.kubernetes.io/instance: kubernetes-dashboard
        app.kubernetes.io/part-of: {{ .Values.projectName }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name | default .Values.fullnameOverride }}
      containers:
        - name: dashboard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --bind-address=0.0.0.0
            {{- range .Values.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          ports:
            - containerPort: 8443
              name: https
            - containerPort: 9090
              name: http
          livenessProbe:
            httpGet:
              path: /
              port: http
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: tmp-storage
              mountPath: /tmp
            - name: certs-storage
              mountPath: /certs
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.metricsScraper.enabled }}
        - name: metrics-scraper
          image: "{{ .Values.metricsScraper.image.repository }}:{{ .Values.metricsScraper.image.tag }}"
          imagePullPolicy: {{ .Values.metricsScraper.image.pullPolicy }}
          ports:
            - containerPort: 8000
              name: http
          volumeMounts:
            - name: tmp-storage
              mountPath: /tmp
          resources:
            {{- toYaml .Values.metricsScraper.resources | nindent 12 }}
        {{- end }}
      volumes:
        - name: tmp-storage
          emptyDir: {}
        - name: certs-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.fullnameOverride }}
  namespace: {{ .Values.namespace }}
  labels:
    app: kubernetes-dashboard
    app.kubernetes.io/name: kubernetes-dashboard
    app.kubernetes.io/part-of: {{ .Values.projectName }}
    app.kubernetes.io/managed-by: helm
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    app: kubernetes-dashboard
{{- if and .Values.metricsScraper.enabled .Values.metricsScraper.service.name }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.metricsScraper.service.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: kubernetes-dashboard
    app.kubernetes.io/name: kubernetes-dashboard
    app.kubernetes.io/part-of: {{ .Values.projectName }}
    app.kubernetes.io/managed-by: helm
spec:
  type: ClusterIP
  selector:
    app: kubernetes-dashboard
  ports:
    - name: http
      port: {{ .Values.metricsScraper.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
