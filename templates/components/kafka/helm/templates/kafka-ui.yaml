{{/*
=============================================================================
Kafka UI - Web interface for Kafka cluster management
=============================================================================
Deploys provectuslabs/kafka-ui with a Deployment and Service.
*/}}

{{- if .Values.kafkaUI }}
{{- if .Values.kafkaUI.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  namespace: {{ .Values.namespace }}
  labels:
    app: kafka-ui
    app.kubernetes.io/name: kafka-ui
    app.kubernetes.io/part-of: {{ .Values.projectName }}
    app.kubernetes.io/managed-by: helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
        app.kubernetes.io/name: kafka-ui
        app.kubernetes.io/part-of: {{ .Values.projectName }}
    spec:
      containers:
        - name: kafka-ui
          image: {{ .Values.kafkaUI.image.repository }}:{{ .Values.kafkaUI.image.tag }}
          imagePullPolicy: {{ .Values.kafkaUI.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: KAFKA_CLUSTERS_0_NAME
              value: {{ .Values.kafka.clusterName }}
            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              value: {{ .Values.kafka.clusterName }}-kafka-bootstrap:{{ .Values.kafka.listeners.plain.port | default 9092 }}
            {{- if .Values.metrics }}
            {{- if .Values.metrics.enabled }}
            - name: KAFKA_CLUSTERS_0_METRICS_PORT
              value: {{ .Values.metrics.jmxExporter.port | default 9404 | quote }}
            - name: KAFKA_CLUSTERS_0_METRICS_TYPE
              value: "JMX"
            {{- end }}
            {{- end }}
          {{- with .Values.kafkaUI.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
  namespace: {{ .Values.namespace }}
  labels:
    app: kafka-ui
    app.kubernetes.io/name: kafka-ui
    app.kubernetes.io/part-of: {{ .Values.projectName }}
    app.kubernetes.io/managed-by: helm
spec:
  type: {{ .Values.kafkaUI.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.kafkaUI.service.port | default 8080 }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: kafka-ui
{{- end }}
{{- end }}
