{{- if .Values.kafkaUI.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  namespace: {{ .Values.namespace }}
  labels:
    app: kafka-ui
    {{- include "strimzi-kafka.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.kafkaUI.replicas }}
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
    spec:
      containers:
        - name: kafka-ui
          image: {{ .Values.kafkaUI.image }}
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_CLUSTERS_0_NAME
              value: {{ include "strimzi-kafka.clusterName" . }}
            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              value: {{ include "strimzi-kafka.clusterName" . }}-kafka-bootstrap:9092
            - name: DYNAMIC_CONFIG_ENABLED
              value: "true"
          resources:
            {{- toYaml .Values.kafkaUI.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 180
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
  namespace: {{ .Values.namespace }}
  labels:
    app: kafka-ui
    {{- include "strimzi-kafka.labels" . | nindent 4 }}
spec:
  type: {{ .Values.kafkaUI.service.type }}
  ports:
    - port: {{ .Values.kafkaUI.service.port }}
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: kafka-ui
# NOTE: Ingress is managed centrally via ingress chart
# with proper IAP authentication. Do NOT add ingress here.
{{- end }}
