{{- if .Values.kafka.kraft.enabled }}
# =============================================================================
# Kafka Cluster with KRaft Mode (No Zookeeper)
# =============================================================================
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: {{ include "strimzi-kafka.clusterName" . }}-pool
  namespace: {{ .Values.namespace }}
  labels:
    strimzi.io/cluster: {{ include "strimzi-kafka.clusterName" . }}
    {{- include "strimzi-kafka.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.kafka.replicas }}
  roles:
    - controller
    - broker
  {{- if or .Values.kafka.nodeSelector .Values.kafka.tolerations }}
  template:
    pod:
      {{- if .Values.kafka.tolerations }}
      tolerations:
        {{- toYaml .Values.kafka.tolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.kafka.nodeSelector }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                {{- range $key, $value := .Values.kafka.nodeSelector }}
                  - key: {{ $key }}
                    operator: In
                    values:
                      - {{ $value }}
                {{- end }}
      {{- end }}
  {{- end }}
  storage:
    {{- if eq .Values.kafka.storage.type "ephemeral" }}
    type: ephemeral
    {{- else }}
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: {{ .Values.kafka.storage.size | default "10Gi" }}
        {{- if .Values.kafka.storage.storageClass }}
        class: {{ .Values.kafka.storage.storageClass }}
        {{- end }}
        deleteClaim: {{ .Values.kafka.storage.deleteClaim | default false }}
    {{- end }}
  resources:
    {{- toYaml .Values.kafka.resources | nindent 4 }}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: {{ include "strimzi-kafka.clusterName" . }}
  namespace: {{ .Values.namespace }}
  annotations:
    strimzi.io/kraft: "enabled"
    strimzi.io/node-pools: "enabled"
  labels:
    {{- include "strimzi-kafka.labels" . | nindent 4 }}
spec:
  kafka:
    version: {{ .Values.kafka.version }}
    metadataVersion: {{ .Values.kafka.version }}
    listeners:
      {{- range .Values.kafka.listeners }}
      - name: {{ .name }}
        port: {{ .port }}
        type: {{ .type }}
        tls: {{ .tls }}
      {{- end }}
    config:
      {{- range $key, $value := .Values.kafka.config }}
      {{ $key }}: {{ $value }}
      {{- end }}
    {{- if .Values.kafka.metricsConfig.enabled }}
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: {{ include "strimzi-kafka.clusterName" . }}-metrics
          key: kafka-metrics-config.yml
    {{- end }}
  {{- if .Values.entityOperator.enabled }}
  entityOperator:
    {{- if .Values.entityOperator.topicOperator.enabled }}
    topicOperator:
      resources:
        {{- toYaml .Values.entityOperator.topicOperator.resources | nindent 8 }}
    {{- end }}
    {{- if .Values.entityOperator.userOperator.enabled }}
    userOperator:
      resources:
        {{- toYaml .Values.entityOperator.userOperator.resources | nindent 8 }}
    {{- end }}
  {{- end }}
{{- else }}
# =============================================================================
# Kafka Cluster with ZooKeeper (Legacy Mode)
# =============================================================================
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: {{ include "strimzi-kafka.clusterName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "strimzi-kafka.labels" . | nindent 4 }}
spec:
  kafka:
    version: {{ .Values.kafka.version }}
    replicas: {{ .Values.kafka.replicas }}
    listeners:
      {{- range .Values.kafka.listeners }}
      - name: {{ .name }}
        port: {{ .port }}
        type: {{ .type }}
        tls: {{ .tls }}
      {{- end }}
    storage:
      {{- if eq .Values.kafka.storage.type "ephemeral" }}
      type: ephemeral
      {{- else }}
      type: jbod
      volumes:
        - id: 0
          type: persistent-claim
          size: {{ .Values.kafka.storage.size | default "10Gi" }}
          deleteClaim: {{ .Values.kafka.storage.deleteClaim | default false }}
      {{- end }}
    config:
      {{- range $key, $value := .Values.kafka.config }}
      {{ $key }}: {{ $value }}
      {{- end }}
    resources:
      {{- toYaml .Values.kafka.resources | nindent 6 }}
  zookeeper:
    replicas: 3
    storage:
      type: ephemeral
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "200m"
  entityOperator:
    topicOperator: {}
    userOperator: {}
{{- end }}
