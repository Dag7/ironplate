apiVersion: apps/v1
kind: Deployment
metadata:
  name: hasura
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hasura.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.hasura.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "hasura.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hasura.labels" . | nindent 8 }}
    spec:
      serviceAccountName: hasura
      terminationGracePeriodSeconds: 30
      {{- with .Values.hasura.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.hasura.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.hasura.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: hasura
          image: {{ .Values.hasura.image.repository }}:{{ .Values.hasura.image.tag }}
          imagePullPolicy: {{ .Values.hasura.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          {{- if .Values.hasura.secrets }}
          envFrom:
            {{- range .Values.hasura.secrets }}
            - secretRef:
                name: {{ . }}
            {{- end }}
          {{- end }}
          env:
            {{- range .Values.hasura.secretEnv }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secretName }}
                  key: {{ .secretKey }}
            {{- end }}
            {{- range $key, $value := .Values.hasura.env }}
            {{- if $value }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.hasura.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.hasura.livenessProbe.path }}
              port: {{ .Values.hasura.livenessProbe.port }}
            initialDelaySeconds: {{ .Values.hasura.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.hasura.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.hasura.livenessProbe.timeoutSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.hasura.readinessProbe.path }}
              port: {{ .Values.hasura.readinessProbe.port }}
            initialDelaySeconds: {{ .Values.hasura.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.hasura.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.hasura.readinessProbe.timeoutSeconds }}
