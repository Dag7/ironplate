{{/*
=============================================================================
ExternalSecret
=============================================================================
Creates ExternalSecret resources that sync secrets from the cloud provider
secret manager into Kubernetes secrets.
=============================================================================
*/}}
{{- range $name, $secret := .Values.secrets }}
---
apiVersion: external-secrets.io/{{ $.Values.eso.version }}
kind: ExternalSecret
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/part-of: {{ $.Values.projectName }}
    app.kubernetes.io/managed-by: helm
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ $.Values.clusterSecretStore.name }}
    kind: ClusterSecretStore
  target:
    name: {{ $name }}
    creationPolicy: Owner
  {{- if $secret.data }}
  data:
    {{- range $secret.data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteRef.key }}
        {{- if .remoteRef.property }}
        property: {{ .remoteRef.property }}
        {{- end }}
    {{- end }}
  {{- else if $secret.dataFrom }}
  dataFrom:
    {{- toYaml $secret.dataFrom | nindent 4 }}
  {{- else }}
  dataFrom:
    - extract:
        key: {{ $secret.remoteRef.key }}
  {{- end }}
{{- end }}
