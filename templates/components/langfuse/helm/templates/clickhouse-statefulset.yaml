{{- if .Values.clickhouse.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: langfuse-clickhouse
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "langfuse.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
spec:
  serviceName: langfuse-clickhouse
  replicas: 1
  selector:
    matchLabels:
      app: langfuse-clickhouse
  template:
    metadata:
      labels:
        {{- include "langfuse.labels" . | nindent 8 }}
        app: langfuse-clickhouse
        app.kubernetes.io/component: clickhouse
    spec:
      terminationGracePeriodSeconds: 60
      {{- with .Values.clickhouse.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.clickhouse.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: clickhouse
          image: {{ .Values.clickhouse.image.repository }}:{{ .Values.clickhouse.image.tag }}
          imagePullPolicy: {{ .Values.clickhouse.image.pullPolicy }}
          ports:
            - containerPort: 8123
              name: http
              protocol: TCP
            - containerPort: 9000
              name: native
              protocol: TCP
          env:
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: langfuse-clickhouse-credentials
                  key: CLICKHOUSE_USER
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: langfuse-clickhouse-credentials
                  key: CLICKHOUSE_PASSWORD
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: logs
              mountPath: /var/log/clickhouse-server
          resources:
            {{- toYaml .Values.clickhouse.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: {{ .Values.clickhouse.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.clickhouse.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.clickhouse.livenessProbe.timeoutSeconds }}
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: {{ .Values.clickhouse.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.clickhouse.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.clickhouse.readinessProbe.timeoutSeconds }}
      volumes:
        - name: logs
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.clickhouse.storage.storageClassName }}
        storageClassName: {{ .Values.clickhouse.storage.storageClassName }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.clickhouse.storage.size }}
{{- end }}
