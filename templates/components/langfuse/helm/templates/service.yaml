{{/*
=============================================================================
Langfuse LLM Observability Service
=============================================================================
*/}}
apiVersion: v1
kind: Service
metadata:
  name: langfuse
  namespace: {{ .Values.namespace }}
  labels:
    app: langfuse
    app.kubernetes.io/name: langfuse
    app.kubernetes.io/instance: langfuse
    app.kubernetes.io/part-of: {{ .Values.projectName }}
    app.kubernetes.io/managed-by: helm
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: langfuse
