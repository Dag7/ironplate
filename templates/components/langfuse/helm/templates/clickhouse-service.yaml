{{- if .Values.clickhouse.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: langfuse-clickhouse
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "langfuse.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
spec:
  type: ClusterIP
  ports:
    - port: 8123
      targetPort: 8123
      name: http
      protocol: TCP
    - port: 9000
      targetPort: 9000
      name: native
      protocol: TCP
  selector:
    app: langfuse-clickhouse
{{- end }}
