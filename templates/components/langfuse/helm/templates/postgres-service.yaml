{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: langfuse-postgres
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "langfuse.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  selector:
    app: langfuse-postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
{{- end }}
