{{/*
=============================================================================
OpenTelemetry Collector
=============================================================================
Receives traces (OTLP) and metrics, then exports to Tempo and Prometheus.
=============================================================================
*/}}

{{/* ConfigMap: collector pipeline configuration */}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: {{ .Values.global.namespace }}
  labels:
    app: otel-collector
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/component: collector
    app.kubernetes.io/part-of: {{ .Values.projectName }}
    app.kubernetes.io/managed-by: helm
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:{{ .Values.otelCollector.ports.grpc }}
          http:
            endpoint: 0.0.0.0:{{ .Values.otelCollector.ports.http }}

    processors:
      batch:
        timeout: 5s
        send_batch_size: 1024

    exporters:
      otlp/tempo:
        endpoint: tempo:{{ .Values.tempo.port }}
        tls:
          insecure: true
      prometheus:
        endpoint: 0.0.0.0:8889
        namespace: {{ .Values.projectName }}

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp/tempo]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus]

{{/* Deployment */}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: {{ .Values.global.namespace }}
  labels:
    app: otel-collector
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/component: collector
    app.kubernetes.io/part-of: {{ .Values.projectName }}
    app.kubernetes.io/managed-by: helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
        app.kubernetes.io/name: otel-collector
        app.kubernetes.io/component: collector
        app.kubernetes.io/part-of: {{ .Values.projectName }}
    spec:
      containers:
        - name: otel-collector
          image: {{ .Values.otelCollector.image.repository }}:{{ .Values.otelCollector.image.tag }}
          imagePullPolicy: {{ .Values.otelCollector.image.pullPolicy }}
          args:
            - --config=/etc/otel/otel-collector-config.yaml
          ports:
            - name: otlp-grpc
              containerPort: {{ .Values.otelCollector.ports.grpc }}
              protocol: TCP
            - name: otlp-http
              containerPort: {{ .Values.otelCollector.ports.http }}
              protocol: TCP
            - name: metrics
              containerPort: 8889
              protocol: TCP
          {{- with .Values.otelCollector.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/otel
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: otel-collector-config

{{/* Service */}}
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: {{ .Values.global.namespace }}
  labels:
    app: otel-collector
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/component: collector
    app.kubernetes.io/part-of: {{ .Values.projectName }}
    app.kubernetes.io/managed-by: helm
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.otelCollector.ports.grpc }}
      targetPort: {{ .Values.otelCollector.ports.grpc }}
      protocol: TCP
      name: otlp-grpc
    - port: {{ .Values.otelCollector.ports.http }}
      targetPort: {{ .Values.otelCollector.ports.http }}
      protocol: TCP
      name: otlp-http
    - port: 8889
      targetPort: 8889
      protocol: TCP
      name: metrics
  selector:
    app: otel-collector
