{{/*
=============================================================================
PrometheusRules for Project Alerts
=============================================================================
Alerting rules for service health and infrastructure monitoring.
*/}}
{{- if .Values.prometheusRules.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ .Values.namespace }}-rules
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "prometheus-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheusrule
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
    # =========================================================================
    # Infrastructure Alerts
    # =========================================================================
    - name: infrastructure
      rules:
        - alert: ServiceDown
          expr: up == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Service {{ `{{ $labels.job }}` }} is down"
            description: "Service {{ `{{ $labels.job }}` }} has been unreachable for more than 5 minutes."

        - alert: HighLatency
          expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High latency detected"
            description: "95th percentile latency is above 2 seconds for {{ `{{ $labels.job }}` }}."

        - alert: HighErrorRate
          expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High error rate detected"
            description: "Error rate is above 5% for {{ `{{ $labels.job }}` }}."
{{- end }}
