{{/*
=============================================================================
Prometheus
=============================================================================
Metrics collection and storage. Scrapes the OTEL collector metrics endpoint
and optionally Kafka, Hasura, and Dapr targets.
=============================================================================
*/}}

{{/* ConfigMap: Prometheus configuration */}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ .Values.global.namespace }}
  labels:
    app: prometheus
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: metrics
    app.kubernetes.io/part-of: {{ .Values.projectName }}
    app.kubernetes.io/managed-by: helm
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.prometheus.scrapeInterval }}
      evaluation_interval: {{ .Values.prometheus.scrapeInterval }}

    scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:{{ .Values.prometheus.port }}"]

      - job_name: "otel-collector"
        static_configs:
          - targets: ["otel-collector:8889"]
    {{- if .Values.scrapeTargets.kafka.enabled }}

      - job_name: "kafka"
        static_configs:
          - targets: ["kafka:9308"]
        metrics_path: /metrics
    {{- end }}
    {{- if .Values.scrapeTargets.hasura.enabled }}

      - job_name: "hasura"
        static_configs:
          - targets: ["hasura:8080"]
        metrics_path: /v1/metrics
    {{- end }}
    {{- if .Values.scrapeTargets.dapr.enabled }}

      - job_name: "dapr"
        static_configs:
          - targets: ["dapr-sidecar-injector:9090"]
        metrics_path: /metrics
    {{- end }}

{{/* Deployment */}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: {{ .Values.global.namespace }}
  labels:
    app: prometheus
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: metrics
    app.kubernetes.io/part-of: {{ .Values.projectName }}
    app.kubernetes.io/managed-by: helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/component: metrics
        app.kubernetes.io/part-of: {{ .Values.projectName }}
    spec:
      containers:
        - name: prometheus
          image: {{ .Values.prometheus.image.repository }}:{{ .Values.prometheus.image.tag }}
          imagePullPolicy: {{ .Values.prometheus.image.pullPolicy }}
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=24h
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: {{ .Values.prometheus.port }}
              protocol: TCP
          {{- with .Values.prometheus.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir:
            sizeLimit: {{ .Values.prometheus.storage.size }}

{{/* Service */}}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: {{ .Values.global.namespace }}
  labels:
    app: prometheus
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: metrics
    app.kubernetes.io/part-of: {{ .Values.projectName }}
    app.kubernetes.io/managed-by: helm
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.prometheus.port }}
      targetPort: {{ .Values.prometheus.port }}
      protocol: TCP
      name: http
  selector:
    app: prometheus
