{{/*
=============================================================================
Grafana Tempo
=============================================================================
Single-node Tempo instance for distributed trace storage and querying.
=============================================================================
*/}}

{{/* ConfigMap: Tempo configuration */}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: {{ .Values.global.namespace }}
  labels:
    app: tempo
    app.kubernetes.io/name: tempo
    app.kubernetes.io/component: tracing
    app.kubernetes.io/part-of: {{ .Values.projectName }}
    app.kubernetes.io/managed-by: helm
data:
  tempo.yaml: |
    server:
      http_listen_port: {{ .Values.tempo.port }}

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:{{ .Values.tempo.port }}
        jaeger:
          protocols:
            thrift_http:
              endpoint: 0.0.0.0:{{ .Values.tempo.jaeger.port }}

    ingester:
      trace_idle_period: 10s
      max_block_bytes: 1048576
      max_block_duration: 5m

    compactor:
      compaction:
        compaction_window: 1h
        max_block_bytes: 104857600
        block_retention: 48h

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal

{{/* Deployment */}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: {{ .Values.global.namespace }}
  labels:
    app: tempo
    app.kubernetes.io/name: tempo
    app.kubernetes.io/component: tracing
    app.kubernetes.io/part-of: {{ .Values.projectName }}
    app.kubernetes.io/managed-by: helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempo
  template:
    metadata:
      labels:
        app: tempo
        app.kubernetes.io/name: tempo
        app.kubernetes.io/component: tracing
        app.kubernetes.io/part-of: {{ .Values.projectName }}
    spec:
      containers:
        - name: tempo
          image: {{ .Values.tempo.image.repository }}:{{ .Values.tempo.image.tag }}
          imagePullPolicy: {{ .Values.tempo.image.pullPolicy }}
          args:
            - -config.file=/etc/tempo/tempo.yaml
          ports:
            - name: http
              containerPort: {{ .Values.tempo.port }}
              protocol: TCP
            - name: jaeger-http
              containerPort: {{ .Values.tempo.jaeger.port }}
              protocol: TCP
          {{- with .Values.tempo.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
              readOnly: true
            - name: data
              mountPath: /var/tempo
      volumes:
        - name: config
          configMap:
            name: tempo-config
        - name: data
          emptyDir: {}

{{/* Service */}}
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: {{ .Values.global.namespace }}
  labels:
    app: tempo
    app.kubernetes.io/name: tempo
    app.kubernetes.io/component: tracing
    app.kubernetes.io/part-of: {{ .Values.projectName }}
    app.kubernetes.io/managed-by: helm
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.tempo.port }}
      targetPort: {{ .Values.tempo.port }}
      protocol: TCP
      name: http
    - port: {{ .Values.tempo.jaeger.port }}
      targetPort: {{ .Values.tempo.jaeger.port }}
      protocol: TCP
      name: jaeger-http
  selector:
    app: tempo
