name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Go CLI ──────────────────────────────────────────────────────────
  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
      - uses: golangci/golangci-lint-action@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          version: latest

  go-test:
    name: Go Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
      - name: Run tests
        run: go test -race -count=1 -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.out

  go-build:
    name: Go Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
      - name: Build
        run: go build -o /dev/null ./cmd/iron
      - name: Verify version
        run: go run ./cmd/iron version

  # ── Go Packages ─────────────────────────────────────────────────────
  go-packages:
    name: Go Packages
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [envconfig, graceful, health]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
      - name: Test ${{ matrix.package }}
        working-directory: packages/go/${{ matrix.package }}
        run: go test -race -count=1 ./...

  # ── Node Packages ───────────────────────────────────────────────────
  # Built from monorepo root to resolve workspace:* cross-dependencies.
  # Topological build order ensures deps are built before dependents.
  node-packages:
    name: Node Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: yarn install
      - name: Build all packages
        run: yarn build
      - name: Typecheck all packages
        run: yarn typecheck
