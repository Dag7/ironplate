name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "Which packages to publish"
        required: true
        type: choice
        options:
          - all
          - node
          - go
      version_bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      package:
        description: "Specific package name (empty = all in scope)"
        required: false
        type: string
        default: ""
      dry_run:
        description: "Dry run (bump & build but don't publish)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # ── Publish Node packages to npm ───────────────────────────────────
  publish-node:
    name: Publish Node Packages
    if: github.event.inputs.scope == 'all' || github.event.inputs.scope == 'node'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Enable Corepack
        run: corepack enable

      - name: Install and build all packages
        run: |
          yarn install
          yarn build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump versions and publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION_BUMP: ${{ inputs.version_bump }}
          TARGET_PACKAGE: ${{ inputs.package }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          published=0
          bumped_files=""

          for dir in packages/node/*/; do
            [ -f "$dir/package.json" ] || continue

            pkg_name=$(node -p "require('./$dir/package.json').name")

            # Skip if a specific package was requested and this isn't it
            if [ -n "$TARGET_PACKAGE" ] && [ "$pkg_name" != "$TARGET_PACKAGE" ] && [ "$(basename "$dir")" != "$TARGET_PACKAGE" ]; then
              continue
            fi

            # Bump version in package.json
            new_version=$(node -e "
              const fs = require('fs');
              const pkgPath = './$dir/package.json';
              const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
              const [major, minor, patch] = pkg.version.split('.').map(Number);
              switch ('$VERSION_BUMP') {
                case 'major': pkg.version = (major+1) + '.0.0'; break;
                case 'minor': pkg.version = major + '.' + (minor+1) + '.0'; break;
                case 'patch': pkg.version = major + '.' + minor + '.' + (patch+1); break;
              }
              fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
              console.log(pkg.version);
            ")

            echo "📦 $pkg_name: bumped to $new_version ($VERSION_BUMP)"
            bumped_files="$bumped_files $dir/package.json"

            if [ "$DRY_RUN" != "true" ]; then
              # Publish from package directory
              cd "$dir"
              npm publish --access public
              cd - > /dev/null

              # Create git tag
              tag="${pkg_name}@${new_version}"
              if ! git rev-parse "$tag" >/dev/null 2>&1; then
                git tag -a "$tag" -m "Release $pkg_name v$new_version"
                echo "🏷️  Created tag: $tag"
              fi
            else
              echo "  (dry run — skipping publish)"
            fi

            published=$((published + 1))
          done

          if [ $published -eq 0 ]; then
            echo "ℹ️  No packages matched"
            exit 0
          fi

          # Commit version bumps
          git add $bumped_files
          git commit -m "chore: bump node package versions ($VERSION_BUMP)

          Bumped $published package(s)" || true

          if [ "$DRY_RUN" != "true" ]; then
            git push origin HEAD --tags
            echo "✅ Published $published package(s)"
          else
            echo "✅ Would publish $published package(s) (dry run)"
          fi

      - name: Summary
        run: |
          echo "## Node Package Publish" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Bump:** ${{ inputs.version_bump }}" >> $GITHUB_STEP_SUMMARY
          echo "**Scope:** ${{ inputs.package || 'all node packages' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Dry run:** ${{ inputs.dry_run }}" >> $GITHUB_STEP_SUMMARY

  # ── Publish Go packages (via git tags) ───────────────────────────────
  publish-go:
    name: Publish Go Packages
    if: github.event.inputs.scope == 'all' || github.event.inputs.scope == 'go'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump versions and tag
        env:
          VERSION_BUMP: ${{ inputs.version_bump }}
          TARGET_PACKAGE: ${{ inputs.package }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          tagged=0
          bumped_files=""

          for dir in packages/go/*/; do
            [ -f "$dir/go.mod" ] || continue
            [ -f "$dir/VERSION" ] || continue

            pkg=$(basename "$dir")

            # Skip if a specific package was requested and this isn't it
            if [ -n "$TARGET_PACKAGE" ] && [ "$pkg" != "$TARGET_PACKAGE" ]; then
              continue
            fi

            # Read current version and bump
            current=$(cat "$dir/VERSION" | tr -d '[:space:]')
            IFS='.' read -r MAJOR MINOR PATCH <<< "$current"

            case "$VERSION_BUMP" in
              major) new_version="$((MAJOR + 1)).0.0" ;;
              minor) new_version="${MAJOR}.$((MINOR + 1)).0" ;;
              patch) new_version="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
            esac

            echo "$new_version" > "$dir/VERSION"
            bumped_files="$bumped_files $dir/VERSION"

            echo "📦 $pkg: $current → $new_version ($VERSION_BUMP)"

            tagged=$((tagged + 1))
          done

          if [ $tagged -eq 0 ]; then
            echo "ℹ️  No packages matched"
            exit 0
          fi

          # Commit version bumps first (tags must point to the bump commit)
          git add $bumped_files
          git commit -m "chore: bump go package versions ($VERSION_BUMP)

          Bumped $tagged package(s)"

          # Now create tags pointing to the bump commit
          for dir in packages/go/*/; do
            [ -f "$dir/go.mod" ] || continue
            [ -f "$dir/VERSION" ] || continue

            pkg=$(basename "$dir")

            if [ -n "$TARGET_PACKAGE" ] && [ "$pkg" != "$TARGET_PACKAGE" ]; then
              continue
            fi

            version=$(cat "$dir/VERSION" | tr -d '[:space:]')
            tag="packages/go/${pkg}/v${version}"

            if [ "$DRY_RUN" != "true" ]; then
              git tag -a "$tag" -m "Release $pkg v$version"
              echo "🏷️  Created tag: $tag"
            else
              echo "🏷️  Would create tag: $tag (dry run)"
            fi
          done

          if [ "$DRY_RUN" != "true" ]; then
            git push origin HEAD --tags
            echo "✅ Tagged $tagged package(s)"
          else
            echo "✅ Would tag $tagged package(s) (dry run)"
          fi

      - name: Run tests
        run: |
          for dir in packages/go/*/; do
            [ -f "$dir/go.mod" ] || continue
            echo "Testing $(basename "$dir")..."
            cd "$dir"
            go test -race -count=1 ./...
            cd - > /dev/null
          done

      - name: Summary
        run: |
          echo "## Go Package Publish" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Bump:** ${{ inputs.version_bump }}" >> $GITHUB_STEP_SUMMARY
          echo "**Scope:** ${{ inputs.package || 'all go packages' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Dry run:** ${{ inputs.dry_run }}" >> $GITHUB_STEP_SUMMARY
