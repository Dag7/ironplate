version: 2

project_name: iron

builds:
  - id: iron
    main: ./cmd/iron
    binary: iron
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/dag7/ironplate/internal/version.Version={{.Version}}
      - -X github.com/dag7/ironplate/internal/version.Commit={{.ShortCommit}}
      - -X github.com/dag7/ironplate/internal/version.Date={{.Date}}

archives:
  - id: default
    name_template: "iron_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

homebrew_casks:
  - repository:
      owner: dag7
      name: homebrew-tap
    homepage: "https://github.com/dag7/ironplate"
    description: "Scaffold production-grade Kubernetes development environments"
    binaries:
      - iron

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore\\(deps\\):"
  groups:
    - title: Features
      regexp: "^feat"
    - title: Bug Fixes
      regexp: "^fix"
    - title: Performance
      regexp: "^perf"
    - title: Maintenance
      regexp: "^chore|^refactor"

release:
  github:
    owner: dag7
    name: ironplate
  prerelease: auto
  header: |
    ## What's Changed

    Install or upgrade:
    ```bash
    brew install dag7/tap/iron
    # or
    go install github.com/dag7/ironplate/cmd/iron@{{ .Tag }}
    ```
